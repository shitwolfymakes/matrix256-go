name: conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fixtures:
    name: Tier-1 fixtures (${{ matrix.os }}, go ${{ matrix.go }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out matrix256-go
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: matrix256-go

      - name: Check out matrix256 spec repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: shitwolfymakes/matrix256
          path: matrix256

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: matrix256-go/go.sum

      - name: Run synthetic fixture suite
        working-directory: matrix256-go
        run: go test ./tests/ -v
