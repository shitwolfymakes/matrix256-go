name: release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Validate tag and warm module proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      # Tests are not run here. The conformance suite needs the spec repo
      # (matrix256) checked out as a sibling for conformance_fixtures.json,
      # which conformance.yml does and runs on every push to main. By the
      # time a tag exists, that gate has already passed.

      - name: Warm proxy.golang.org
        run: |
          # Triggers the public Go module proxy to fetch this version from
          # GitHub. Once this returns 200 the tag is reachable for `go get`.
          curl -fsS "https://proxy.golang.org/github.com/shitwolfymakes/matrix256-go/@v/${GITHUB_REF_NAME}.info"

      - name: Nudge pkg.go.dev
        run: |
          # Best-effort: pkg.go.dev indexes lazily on first request.
          # Failure here is not fatal; the proxy warm above is what matters.
          curl -fsS "https://pkg.go.dev/fetch/github.com/shitwolfymakes/matrix256-go@${GITHUB_REF_NAME}" || true
